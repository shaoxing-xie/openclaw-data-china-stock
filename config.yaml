  sms:
    enabled: false
  feishu_app:
    enabled: true
    # 使用数据采集应用（与插件使用相同的应用），通过环境变量注入凭证
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    encrypt_key: ''
    # 飞书云空间根文件夹token
    feishu_root_folder_token: "${FEISHU_ROOT_FOLDER_TOKEN}"
