  enabled: true
  # 使用环境变量 TUSHARE_TOKEN 注入，避免明文写入仓库
  token: "${TUSHARE_TOKEN}"
  prefer_minute: false

llm_enhancer:
  enabled: true                     # 是否开启LLM增强
  provider: "deepseek"              # 提供商标识（deepseek / openai / grok / local 等）
  api_base_url: "https://api.deepseek.com/v1"   # 兼容OpenAI格式的Base URL
  api_key: "${LLM_API_KEY}"  # 请使用环境变量配置
  model: "deepseek-chat"            # 模型名
  temperature: 0.7                  # 创造性（0.0-1.0，建议0.6-0.8）
  max_tokens: 500                   # 最大输出token
  timeout_seconds: 60               # 单次调用超时时间（增加到30秒，因为盘后分析数据量大）
  retry_attempts: 2                 # 失败重试次数
  retry_delay: 2.0                  # 重试延迟（秒）
  analysis_types:                   # 启用LLM增强的分析类型
    - before_open                   # 盘前分析（9:15）
    - opening_market                # 开盘行情分析（9:28）
    - after_close                   # 盘后分析
    - volatility_prediction         # 波动预测（即时查询，飞书指令/仪表盘）
    - intraday_summary              # 盘中小结（盘中波动快照统一解读）
    - signal_watch                  # 信号生成LLM增强（v1.1优化方案）
  prompt_config_path: "Prompt_config.yaml"  # Prompt配置文件路径
  # 轻量连续记忆配置（阶段一）
  context_enabled: true                 # 是否启用本地摘要连续记忆
  context_file: "data/cache/llm_context_today.json"  # 当日摘要缓存文件
  summary_max_items: 6                  # 当天最多保留最近 N 条摘要