logging:
  level: INFO
  console: true
  file: true
  file_path: logs/option_trading_{date}.log
  max_file_size_mb: 10
  backup_count: 7
realtime_full_fetch_cache:
  # 是否对“全量拉取 -> 筛选”的实时行情做进程内短缓存
  # 缺省：开启；TTL 秒数建议 30-60，平衡实时性与成本
  enabled: true
  ttl_seconds: 45

# 预测落库质量门禁（src/prediction_normalizer.validate_prediction_quality）
prediction_quality:
  min_range_pct: 0.5
  max_range_pct: 10.0
  band_low_factor: 0.95
  band_high_factor: 1.05
  expected_low_margin: 0.8
  expected_high_margin: 1.2

# 周报与异常检测（scripts/prediction_metrics_weekly.py）
prediction_monitoring:
  rolling_days: 20
  baseline_rolling_days: 20
  min_samples_for_alert: 8
  hit_rate_drop_alert_pp: 25.0

signal_params:
  # 原有参数（保留兼容）
  rsi_oversold: 40
  rsi_overbought: 60
  price_change_threshold: 1.5
  iv_multiplier: 1.2
  signal_deduplication_time: 1800
  min_trend_strength_strong: 0.7
  min_signal_strength: 0.6
  call_rsi_strong: 30
  call_rsi_mid: 40
  put_rsi_mid: 60
  put_rsi_strong: 70
  boundary_price_mult: 1.2
  boundary_confidence_min: 0.6
  boundary_base_strength: 0.45
  call_trend_boost: 1.05
  call_trend_penalty: 0.95
  put_trend_boost: 1.05
  put_trend_penalty: 0.95
  # 新增优化参数（v1.0优化方案）
  use_optimized_v1: true     # 是否启用优化方案v1.0（默认false，保持原有逻辑）
  # GROK v2.0优化方案权重分配（总和=100%）
  boundary_rebound_weight: 0.40  # 边界反弹权重（提升为主逻辑，均值回归核心）
  rsi_divergence_weight: 0.15    # RSI背离权重
  macd_turnover_weight: 0.15      # MACD转折权重
  greeks_iv_weight: 0.20         # Greeks/IV确认权重
  daily_trend_weight: 0.10       # 日线趋势辅助权重（新增，20日MA判断）
  # 保留旧权重字段以兼容（逐步废弃）
  etf_turnover_weight: 0.65  # ETF短期K线转折权重（兼容字段，实际由上述权重组成）
  macro_weight: 0.10          # 大盘趋势辅助权重（兼容字段）
  rsi_divergence_threshold: 5  # RSI背离阈值（点数）
  macd_hist_turnover_pct: 20   # MACD Histogram转折阈值（%）
  boundary_position_call: 0.25  # Call信号边界位置阈值（<25%）
  boundary_position_put: 0.75    # Put信号边界位置阈值（>75%）
  boundary_rebound_pct: 0.5     # 边界反弹幅度阈值（%）
  delta_change_threshold: 0.1   # Delta变化阈值
  gamma_peak_mult: 1.5          # Gamma峰值倍数（相对于当天均值）
  iv_change_threshold: 5        # IV变化率阈值（%）
  signal_strength_levels:
    strong: 0.75   # 强信号阈值
    medium: 0.55   # 中等信号阈值
    weak: 0.45     # 弱信号阈值（最低生成阈值）
  enable_weak_signal_notification: false  # 是否启用弱信号通知（默认不推送）
  # LLM增强信号生成参数（v1.1优化方案）
  llm_watch_enabled: true  # 是否启用LLM增强信号生成（默认关闭）
  llm_watch_threshold: 0.5  # 规则强度触发LLM阈值（建议0.5-0.55）
  llm_watch_cache_minutes: 5  # 调用频率限制：同一标的物N分钟内最多1次
  llm_watch_sequence_threshold_high: 0.6  # 强度≥此值时发送10条序列
  llm_watch_sequence_threshold_low: 0.5   # 强度≥此值时发送5条序列
  # GROK v2.0优化方案：ETF-期权联动机制
  filter_by_etf: true  # 是否使用ETF信号过滤期权方向（默认启用）
  etf_filter_threshold: 0.6  # ETF信号强度阈值（>此值时过滤期权方向）
  etf_filter_strength_adjustment: 0.1  # ETF过滤时，同方向信号阈值降低幅度
  # 510300 日内监控专用参数（默认方案）
  intraday_monitor_510300:
    enabled: true
    poll_interval_minutes: 5          # 监控频率：每5分钟
    symbol: "510300"
    index_benchmark: "000300"         # 参考指数，用于偏离/β分析
    timeframe_minutes: 30             # 日内关键均线与RSI所用K线周期（30分钟K）
    ma_periods:
      - 10                            # 30分钟MA10
      - 20                            # 30分钟MA20
    rsi_period: 14                    # RSI14 on 30m
    rsi_extreme:
      oversold: 30                    # 极端超卖区
      overbought: 70                  # 极端超买区
      exit_margin: 5                  # 从极端区间“回归”的缓冲（例如从<=30上穿到>=35）
    volatility:
      use_intraday_range_prediction: true  # 是否结合tool_predict_intraday_range
      max_intraday_pct: 0.04               # 单日合理波动上限（4%）
      min_intraday_pct: 0.005              # 单日有效波动下限（0.5%，过滤极端平盘日）
    trend_filter_daily:
      enabled: true
      ma_short: 20                   # 日线短期均线
      ma_long: 60                    # 日线长期均线
      # 放宽日线过滤：允许日线非主趋势下的 call/put 研究级反向/转折信号同发（允许一定噪声）
      require_uptrend_for_long: false
    signal_thresholds:
      min_strength_for_alert: 0.5    # 触发告警的最小综合信号强度（0-1）
      min_trend_score: 0.3           # 趋势信号最低得分
    notification:
      enabled: true
      channel: "feishu"
      push_when:
        - "entry_opportunity"        # 建仓/加仓建议
        - "risk_warning"             # 风险/减仓/止损建议
        - "context_update"           # 重要趋势/波动环境变化
etf_trading:
  enabled: true
  enabled_etfs:
  - "510300"
  - "510050"
  - "510500"
  model_weights:
    prophet: 0.35
    arima: 0.3
    technical: 0.35
  voting_threshold: 0.6
  min_agreements: 2
  backtest:
    evaluation_windows:
    - 1
    - 2
    - 3
    - 5
    buy_threshold: 0.0025
    sell_threshold: 0.004
  short_cycle:
    ma_periods:
    - 10
    - 30
    volume_multiplier: 1.2
    spread_threshold: 0.3
  # GROK v2.0优化方案：ETF短波段交易（1-5天）
  short_term:
    enabled: true  # 是否启用短波段信号
    ma_long: 20  # 日线长期均线周期（用于定趋势）
    ma_short: 10  # 日线短期均线周期（用于回调判断）
    volume_multiplier: 1.2  # 成交量放大倍数阈值
    min_strength: 0.6  # 短波段信号最低强度
    minute_timeframe: 30  # 分钟级入场时间框架（30分钟）
    stop_loss_pct: 0.05  # 止损比例（20日MA下方5%）
    take_profit_target: "volatility_upper"  # 止盈目标（波动区间上轨）
  position_management:
    strong_trend:
    - 0.5
    - 0.8
    medium_trend:
    - 0.3
    - 0.5
    weak_trend:
    - 0.0
    - 0.2
    max_single_position: 0.8
    max_total_position: 1.0
  risk_management:
    stop_loss_pct: 0.05
    take_profit_pct: 0.05
    trailing_stop_pct: 0.03
    max_drawdown_limit: 0.15
  signal_alerts:
    enable_position_adjustment: true
    enable_stop_loss_take_profit: true
    enable_trend_change: true
  option_linkage:
    enabled: true
    liquidity_threshold: fair
    check_expiry: true
  # 缺口策略（辅助策略）
  gap_strategy:
    enabled: true  # 是否启用缺口策略
    gap_threshold: 0.008  # 跳空阈值（0.8%，即0.008）
    fillback_threshold: 0.003  # 回补阈值（0.3%，即0.003）
    min_signal_strength: 0.6  # 最低信号强度（0-1）
