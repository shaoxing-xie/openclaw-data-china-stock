  scheduler:
    enabled: true
    hour: 9
    minute: 28
  indices:
    沪深300: "000300"
    上证50: "000016"
    上证指数: "000001"
    深证成指: "399001"
    创业板指: "399006"
    科创50: "000688"
    中证500: "000905"
  weights:
    沪深300: 0.32      # +0.02，更突出核心标的
    上证50: 0.22        # +0.02，权重股代表性再强化
    上证指数: 0.14      # 保持不变
    深证成指: 0.11      # -0.01，略微降低（深成指与沪深300重叠较多）
