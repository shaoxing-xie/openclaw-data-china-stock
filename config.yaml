  market_calibration:
    enabled: true
    bid_adjustment: 0.98
    ask_adjustment: 1.02
    max_deviation_pct: 20.0
  iv_percentile_adjustment:
    enabled: true
    lookback_days: 30
    high_percentile: 70
    low_percentile: 30
    high_compress: 0.85
    low_expand: 1.15
  garch_iv:
    enabled: true
    lookback_days: 30
    garch_order:
    - 1
    - 1
    distribution: normal
    confidence_level: 0.95
  liquidity_thresholds:
    excellent:
      max_spread_pct: 0.5
      min_depth: 100
    good:
      max_spread_pct: 1.0
      min_depth: 50
    fair:
      max_spread_pct: 2.0
      min_depth: 20
    poor:
      max_spread_pct: 5.0
      min_depth: 10
    critical:
      max_spread_pct: 10.0
      min_depth: 5
